name: Ralph Loop

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ralph-loop
  cancel-in-progress: false

jobs:
  ralph:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Ralph
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/ralph_run.py

      - name: Commit and push changes
        run: |
          git config user.name "ralph-bot"
          git config user.email "ralph-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            # Read commit message from file if the runner left one
            if [ -f .ralph_commit_msg ]; then
              git commit -F .ralph_commit_msg
              rm .ralph_commit_msg
            else
              git commit -m "ralph: $(date -u +%Y-%m-%d) — no-op run"
            fi
            git push
          fi
