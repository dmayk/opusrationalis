name: Opus Loop

on:
  schedule:
    - cron: '0 3,15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ralph-loop
  cancel-in-progress: false

jobs:
  ralph:
    runs-on: self-hosted
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Run Ralph
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: python scripts/ralph_run.py

      - name: Commit and push changes
        run: |
          git config user.name "opus-bot"
          git config user.email "opus-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            if [ -f .ralph_commit_msg ]; then
              git commit -F .ralph_commit_msg
              rm .ralph_commit_msg
            else
              git commit -m "ralph: $(date -u +%Y-%m-%d) — no-op run"
            fi
            git push
          fi

      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publish Pages
        if: success()
        uses: actions/deploy-pages@v4

      - name: Check for warnings
        id: warnings
        if: always()
        run: |
          if [ -f .ralph_warnings ]; then
            echo "has_warnings=true" >> "$GITHUB_OUTPUT"
            echo "warnings_body<<WARNINGS_EOF" >> "$GITHUB_OUTPUT"
            cat .ralph_warnings >> "$GITHUB_OUTPUT"
            echo "WARNINGS_EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Send soft-failure alert
        if: always() && steps.warnings.outputs.has_warnings == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.me.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Ralph warning — ${{ github.repository }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: Opus Bot <${{ secrets.SMTP_USERNAME }}>
          body: ${{ steps.warnings.outputs.warnings_body }}

      - name: Send failure alert
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.mail.me.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Ralph run failed — ${{ github.repository }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: Opus Bot <${{ secrets.SMTP_USERNAME }}>
          body: |
            Ralph run failed on ${{ github.repository }}.

            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Branch: ${{ github.ref_name }}
            Trigger: ${{ github.event_name }}

            Check the Actions log for details.
