<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opus Rationalis</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Top Bar -->
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
    </button>
    <a href="#/" class="topbar-brand">Opus Rationalis</a>
    <div class="topbar-search">
      <input type="search" id="search-input" placeholder="Search claims, passages, profiles..." autocomplete="off" />
      <div id="search-results" class="search-dropdown" hidden></div>
    </div>
    <div class="topbar-lens">
      <label for="lens-select" class="sr-only">Profile lens</label>
      <select id="lens-select">
        <option value="">All traditions</option>
      </select>
    </div>
  </header>

  <!-- Layout -->
  <div class="layout">
    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Left Sidebar -->
    <nav id="sidebar" class="sidebar" aria-label="Main navigation">
      <div class="sidebar-section">
        <a href="#/" class="sidebar-link" data-route="#/">Home</a>
        <a href="#/how-it-works" class="sidebar-link" data-route="#/how-it-works">How It Works</a>
        <a href="#/explore" class="sidebar-link" data-route="#/explore">Explore Claims</a>
      </div>
      <div class="sidebar-section" id="sidebar-doctrines">
        <!-- Dynamically rendered: doctrines > claims -->
      </div>
      <div class="sidebar-section">
        <h3 class="sidebar-heading">Profiles</h3>
        <div id="sidebar-profiles">
          <!-- Dynamically rendered from profile data -->
        </div>
      </div>
      <div class="sidebar-section">
        <h3 class="sidebar-heading">System</h3>
        <a href="#/transparency" class="sidebar-link" data-route="#/transparency">Transparency</a>
        <a href="#/activity" class="sidebar-link" data-route="#/activity">Activity</a>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main">
      <!-- Router renders views here -->
    </main>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <p>No claims are presented as settled without resolution trees and profile-conditioned traces.</p>
      <a href="https://github.com/dmayk/opusrationalis" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
